<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banco Inter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h2><img src="./assets/Inter.png" alt=""></h2>
      <div class="links">
        <a href="#">Home</a>
        <a href="#">Sobre</a>
        <a href="#">Contato</a>
        <a href="#">Ajuda</a>
      </div>
    </header>
    <div class="hero">
      <h1></h1>
    </div>
    <div class="cards">
      <!-- Card 1 -->
      <div class="card">
        <div class="card-img-01"></div>
        <p>Cofrinho</p>
        <button>RENDE ATÈ 110% DO CDI</button>
      </div> 

      <div class="card">
        <div class="card-img-02"></div>
        <p>Invista!</p>
        <button>AGORA.</button>
      </div>

       <div class="card">
        <div class="card-img-03"></div>
        <p>Conta Poupança</p>

        <div class="card-img-05"></div>

      </div>

       <div class="card">
        <div class="card-img-06"></div>
        <p>Finanças</p>
        <button>Planeje seu futuro!</button>

        <div class="card-img-07"></div>

        <button>Tudo para o seu dia a dia</button>
      </div>

       <div class="card">
        <div class="card-img-08"></div>
        <p>Precisa de ajuda especial?</p>
        <button>Suporte inlusivo</button>
      </div>

       <div class="card">
        <div class="card-img-09"></div>
        <p>Termos de Política de Privacidade e Condições</p>
